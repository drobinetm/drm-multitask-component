name: Angular Release

on:
  push:
    branches:
      - main
    paths:
      - packages/angular/**
      - .github/workflows/angular-release.yml
  workflow_dispatch:
    inputs:
      dist-tag:
        description: npm dist-tag to publish
        required: false
        default: latest

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  release-angular:
    name: Release Angular package
    runs-on: ubuntu-latest
    env:
      NPM_DIST_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.dist-tag || 'latest' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Angular package
        run: pnpm --filter @drobinetm/multitabs-angular build

      - name: Detect Angular changeset
        id: angular_changeset
        run: |
          FOUND=$(grep -rl '@drobinetm/multitabs-angular' .changeset/ 2>/dev/null || true)
          echo "Changeset files found: ${FOUND:-none}"
          if [ -n "$FOUND" ]; then
            echo "has_changeset=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changeset=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip publish when no Angular changeset exists
        if: steps.angular_changeset.outputs.has_changeset != 'true'
        run: echo "No changeset for @drobinetm/multitabs-angular was found. Skipping publish."

      - name: Ensure version is not already published
        if: steps.angular_changeset.outputs.has_changeset == 'true'
        run: |
          VERSION=$(node -p "require('./packages/angular/package.json').version")
          if npm view "@drobinetm/multitabs-angular@${VERSION}" version >/dev/null 2>&1; then
            echo "Version ${VERSION} is already published to npm"
            exit 1
          fi

      - name: Release Angular package
        if: steps.angular_changeset.outputs.has_changeset == 'true'
        run: pnpm --filter @drobinetm/multitabs-angular exec npm publish --access public --tag "$NPM_DIST_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

name: Angular Release

on:
  # Disabled until @drobinetm/multitabs-angular is ready for its first release.
  # To re-enable: restore the push trigger below and configure Trusted Publishing
  # on npmjs.com for this workflow.
  workflow_dispatch:
    inputs:
      dist-tag:
        description: npm dist-tag to publish
        required: false
        default: latest

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read
  id-token: write

jobs:
  release-angular:
    name: Release Angular package
    runs-on: ubuntu-latest
    env:
      NPM_DIST_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.dist-tag || 'latest' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org
          provenance: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Ensure version is not already published
        run: |
          VERSION=$(node -p "require('./packages/angular/package.json').version")
          if npm view "@drobinetm/multitabs-angular@${VERSION}" version >/dev/null 2>&1; then
            echo "Version ${VERSION} is already published to npm"
            exit 1
          fi

      - name: Release Angular package
        run: pnpm --filter @drobinetm/multitabs-angular exec npm publish --access public --tag "$NPM_DIST_TAG"

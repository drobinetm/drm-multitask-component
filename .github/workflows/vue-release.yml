name: Vue Release

on:
  push:
    branches:
      - main
    paths:
      - packages/vue/**
      - .github/workflows/vue-release.yml
  workflow_dispatch:
    inputs:
      dist-tag:
        description: npm dist-tag to publish
        required: false
        default: latest

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read
  id-token: write

jobs:
  release-vue:
    name: Release Vue package
    runs-on: ubuntu-latest
    env:
      NPM_DIST_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.dist-tag || 'latest' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
          provenance: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Vue package
        run: pnpm --filter @drobinetm/multitabs-vue build

      - name: Detect Vue changeset
        id: vue_changeset
        run: |
          FOUND=$(grep -rl '@drobinetm/multitabs-vue' .changeset/ 2>/dev/null || true)
          echo "Changeset files found: ${FOUND:-none}"
          if [ -n "$FOUND" ]; then
            echo "has_changeset=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changeset=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip publish when no Vue changeset exists
        if: steps.vue_changeset.outputs.has_changeset != 'true'
        run: echo "No changeset for @drobinetm/multitabs-vue was found. Skipping publish."

      - name: Ensure version is not already published
        if: steps.vue_changeset.outputs.has_changeset == 'true'
        run: |
          VERSION=$(node -p "require('./packages/vue/package.json').version")
          if npm view "@drobinetm/multitabs-vue@${VERSION}" version >/dev/null 2>&1; then
            echo "Version ${VERSION} is already published to npm"
            exit 1
          fi

      - name: Release Vue package
        if: steps.vue_changeset.outputs.has_changeset == 'true'
        run: npm publish --access public --tag "$NPM_DIST_TAG"
        working-directory: packages/vue
